<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyric Video Generator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="eyebrow">Creative Space MVP</div>
      <h1>Lyric Video Generator</h1>
      <p class="lede">Upload a song, paste lyrics, choose output format, and render ready-to-post MP4s.</p>
      <form id="generator-form">
        <label>
          <span>Song file</span>
          <input type="file" name="audio" accept=".mp3,.wav,audio/mpeg,audio/wav" required />
        </label>

        <label>
          <span>Lyrics</span>
          <textarea name="lyrics" rows="10" placeholder="Paste full lyrics here" required></textarea>
        </label>

        <label>
          <span>Background image or looping video</span>
          <input type="file" name="background" accept=".png,.jpg,.jpeg,.mp4,.mov,.webm" />
        </label>

        <div class="grid">
          <label>
            <span>Font size</span>
            <input type="number" name="font_size" min="24" max="120" value="56" />
          </label>
          <label>
            <span>Text position</span>
            <select name="text_position">
              <option value="bottom">Bottom</option>
              <option value="middle">Middle</option>
              <option value="top">Top</option>
            </select>
          </label>
          <label>
            <span>Primary color</span>
            <input type="color" name="primary_color" value="#FFFFFF" />
          </label>
          <label>
            <span>Highlight color</span>
            <input type="color" name="highlight_color" value="#FFD54A" />
          </label>
          <label>
            <span>Background dim</span>
            <input type="range" name="background_dim" min="0" max="0.9" step="0.05" value="0.35" />
          </label>
          <label>
            <span>Output</span>
            <select name="output_mode">
              <option value="both">Both</option>
              <option value="horizontal">Horizontal 16:9</option>
              <option value="vertical">Vertical 9:16</option>
            </select>
          </label>
        </div>

        <button type="submit">Render Video</button>
      </form>

      <section id="status" class="status hidden">
        <div id="status-text">Waiting</div>
        <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
        <ul id="warnings"></ul>
        <div id="downloads" class="downloads"></div>
      </section>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
